# TIPS: Text-Image Pretraining with Spatial awareness
# Based on FlexiMedDINOv3-Base + CLIP loss for vision-language alignment
#
# This config combines:
# - DINOv3 self-supervised losses (DINO, iBOT, KoLeo)
# - CLIP contrastive loss for vision-language alignment
#
# Usage:
#   python -m dinov3.train.train_tips --config-file dinov3/configs/train/tips_fleximeddinov3_b_pretrain.yaml
#
MODEL:
  META_ARCHITECTURE: TIPSMetaArch
  DEVICE: cuda
  WEIGHTS: ''
  DTYPE: float32

compute_precision:
  param_dtype: bf16
  reduce_dtype: fp32
  sharding_strategy: SHARD_GRAD_OP

data:
  norm: 'ct'  # default 'ct' else zscore

# ============ DINO Configuration ============
dino:
  loss_weight: 1.0
  global_ignore_diagonal: true
  head_n_prototypes: 65536
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 2048
  koleo_loss_weight: 0.0  # TIPS paper does not use KoLeo loss (set to 0.1 if you want to enable)
  koleo_loss_distributed: false
  koleo_topk: 1
  koleo_distributed_replicas: 0
  koleo_distributed_loss_group_size: null
  force_weight_norm: false
  reweight_dino_local_loss: false

# ============ iBOT Configuration ============
ibot:
  loss_weight: 1.0
  mask_sample_probability: 0.5
  mask_ratio_min_max:
    - 0.1
    - 0.5
  mask_random_circular_shift: false
  force_masking_even_with_zero_weight: false
  separate_head: true
  head_n_prototypes: 65536
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 2048

# ============ Gram Loss Configuration ============
gram:
  use_loss: false
  compute_stats: false
  ema_teacher: false
  ckpt: null
  loss_weight: 1.0
  normalized: true
  img_level: false
  tokens_used: all
  rep_update: false
  update_frequency: 1000
  it_first_update: 0
  it_load_ema_teacher: -1
  remove_neg: false
  remove_only_teacher_neg: false
  global_teacher_resize_method: bilinear
  global_teacher_resize_antialias: true
  max_updates: null

# ============ VLM (TIPS) Configuration ============
vlm:
  enabled: true
  loss_weight: 1.0  # Weight for CLIP loss relative to DINO/iBOT losses
  embed_dim: 768    # VLM embedding dimension (text and projected vision features)
  
  # Text backbone configuration
  # Options: text_backbone_small.yaml (384d), text_backbone_medium.yaml (768d), text_backbone.yaml (1280d)
  text_backbone_config: dinov3/eval/text/configs/text_backbone_medium.yaml
  text_backbone_pretrained_weights: null  # Path to pretrained text encoder weights
  text_model_freeze_backbone: false       # Whether to freeze text backbone
  text_model_num_head_blocks: 0           # Additional transformer blocks on top of text backbone
  text_model_head_blocks_is_causal: true
  text_model_head_blocks_drop_prob: 0.0
  text_model_tokens_pooler_type: argmax   # How to pool text tokens: first, last, argmax
  text_model_use_linear_projection: true  # Project text features to embed_dim
  
  # Tokenizer configuration  
  text_vocab_path_or_url: https://dl.fbaipublicfiles.com/dinov3/thirdparty/bpe_simple_vocab_16e6.txt.gz
  context_length: 77
  
  # Vision projection
  use_projection_head: true  # Project vision CLS token to VLM embed_dim
  use_both_global_crops: false  # Use both global crops for CLIP loss (average) or just first
  
  # Logit scale (temperature)
  init_logit_scale: 2.659260036932778  # ln(1/0.07) from CLIP
  freeze_logit_scale: false

# ============ Training Configuration ============
train:
  batch_size_per_gpu: 64  # Reduced from 100 due to additional text model memory
  dataset_path: null      # Set to your image-caption dataset
  saveckp_freq: 1000
  seed: 0
  num_workers: 8
  OFFICIAL_EPOCH_LENGTH: 1000
  monitor_gradient_norm: false
  chunk_schedule: []
  cache_dataset: true
  use_teacher_head: true
  learn_from_teacher_tokens: false
  centering: sinkhorn_knopp
  checkpointing: true
  checkpointing_full: false
  compile: true
  cudagraphs: false
  sharded_eval_checkpoint: true
  keep_last_n_checkpoints: 5
  output_dir: ./outputs/tips_training

# ============ Student (Vision) Configuration ============
student:
  arch: fleximeddinov3_base
  patch_size: 8
  drop_path_rate: 0.2
  layerscale: 1.0e-05
  patch_drop: 0.0
  pretrained_weights: ''
  dinov3_weights: ''  # Path to pretrained DINOv3 weights (optional)
  ffn_layer: mlp
  ffn_ratio: 4.0
  resume_from_teacher_chkpt: ''
  qkv_bias: false
  proj_bias: true
  ffn_bias: true
  norm_layer: layernorm
  n_storage_tokens: 4
  mask_k_bias: true
  in_chans: 1
  pos_embed_type: rope
  pos_embed_rope_base: 100.0
  pos_embed_rope_min_period: null
  pos_embed_rope_max_period: null
  pos_embed_rope_normalize_coords: separate
  pos_embed_rope_shift_coords: null
  pos_embed_rope_jitter_coords: null
  pos_embed_rope_rescale_coords: 2
  pos_embed_rope_dtype: bf16
  fp8_enabled: false
  fp8_filter: "blocks"

# ============ Teacher Configuration ============
teacher:
  momentum_teacher: null
  final_momentum_teacher: null
  warmup_teacher_temp: null
  teacher_temp: null
  warmup_teacher_temp_epochs: null
  in_chans: 1

# ============ Distillation Configuration ============
distillation:
  enabled: false
  full_cfg_path: ''
  checkpoint_path: ''

multidistillation:
  enabled: false

hrft:
  enabled: false
  checkpoint_path: ''

# ============ Optimizer Configuration ============
optim:
  epochs: 500
  optimizer: adamw
  weight_decay: null
  weight_decay_end: null
  lr: null
  schedule_trunc_extra: null
  warmup_epochs: null
  min_lr: null
  clip_grad: 3.0
  freeze_last_layer_epochs: null
  scaling_rule: sqrt_wrt_1024
  patch_embed_lr_mult: 0.2
  dino_head_wd_multiplier: 1.0
  layerwise_decay: 0.9
  multi_tensor_optim: true
  dump_fsdp_weights_path: ''
  adamw_beta1: 0.9
  adamw_beta2: 0.999

# ============ Crops Configuration ============
crops:
  global_crops_scale:
    - 0.32
    - 1.0
  local_crops_number: 8
  local_crops_scale:
    - 0.05
    - 0.32
  global_crops_size: 256
  local_crops_size: 112
  localcrops_subset_of_globalcrops: false
  share_color_jitter: false
  horizontal_flips: true
  gram_teacher_crops_size: null
  gram_teacher_no_distortions: false
  rgb_mean:
    - 0.485
    - 0.456
    - 0.406
  rgb_std:
    - 0.229
    - 0.224
    - 0.225

# ============ Checkpointing Configuration ============
checkpointing:
  period: 5000
  max_to_keep: 9999

# ============ Learning Rate Schedules ============
schedules:
  lr:
    start: 0
    peak: 2.0e-04
    end: 2.0e-05
    warmup_epochs: 30
    freeze_last_layer_epochs: 3
  weight_decay:
    start: 0.04
    peak: 0.04
    end: 0.4
    warmup_epochs: 0
  teacher_temp:
    start: 0.04
    peak: 0.07
    end: 0.07
    warmup_epochs: 30
  momentum:
    start: 0.994
    peak: 0.994
    end: 1.0
    warmup_epochs: 0
