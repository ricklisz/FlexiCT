# TIPS: Text-Image Pretraining with Spatial awareness
# Based on fleximeddinov3_b_ct_3D_randcrop_pretrain.yaml with added VLM components
#
# Key differences from standard DINOv3:
# 1. Uses TIPSMetaArch instead of SSLMetaArch
# 2. Uses 1 global crop instead of 2 (TIPS paper Section 3.2)
# 3. Adds CLIP contrastive loss for vision-language alignment
# 4. No DINO global loss (only local crops vs single global crop)
# 5. KoLeo loss disabled (not used in TIPS paper)

MODEL:
  META_ARCHITECTURE: TIPSMetaArch
  DEVICE: cuda
  WEIGHTS: ''
  DTYPE: float32

compute_precision:
  param_dtype: bf16
  reduce_dtype: fp32
  sharding_strategy: SHARD_GRAD_OP

data:
  norm: 'ct'  # default 'ct' else zscore
rcc:
  masking: "rcc"  # "rcc" (official RCC masking) or "default" (DINOv2 masking)

# ============ DINO Configuration ============
dino:
  loss_weight: 0.5
  global_ignore_diagonal: true
  head_n_prototypes: 65536
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 2048
  koleo_loss_weight: 0.0  # TIPS paper does not use KoLeo loss
  koleo_loss_distributed: false
  koleo_topk: 1
  koleo_distributed_replicas: 0
  koleo_distributed_loss_group_size: null
  force_weight_norm: false
  reweight_dino_local_loss: false
# ============ iBOT Configuration ============
ibot:
  loss_weight: 1.0
  mask_sample_probability: 0.5
  mask_ratio_min_max:
    - 0.1
    - 0.5
  mask_random_circular_shift: false
  force_masking_even_with_zero_weight: false
  separate_head: true
  head_n_prototypes: 65536
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 2048

# ============ Gram Configuration ============
gram:
  use_loss: true
  ckpt: 'gram_teacher'
  compute_stats: false
  loss_weight: 1.0
  ema_teacher: false
  it_load_ema_teacher: -1
  rep_update: false
  update_frequency: 10000
  it_first_update: 1010000
  max_updates: 3
  normalized: true
  img_level: true
  remove_neg: false
  remove_only_teacher_neg: false
  tokens_used: all
  global_teacher_resize_method: bicubic
  global_teacher_resize_antialias: false
  loss_weight_schedule:
    start: 1.5
    peak: 1.5
    end: 1.5
    warmup_epochs: 0
    cosine_epochs: 0

# ============ VLM (TIPS) Configuration ============
vlm:
  enabled: true
  loss_weight: 1.0  # Weight for CLIP loss relative to DINO/iBOT losses
  embed_dim: 1024    # VLM embedding dimension (text and projected vision features)
  
  # ============ Text Encoder Selection ============
  # Set use_hf_text_encoder: true to use HuggingFace models (recommended)
  # Set use_hf_text_encoder: false to use custom text transformer
  use_hf_text_encoder: true
  
  # ============ HuggingFace Text Encoder Configuration ============
  # Used when use_hf_text_encoder: true
  hf_model_name_or_path: "Qwen/Qwen3-Embedding-0.6B"  # HuggingFace model name or path
  hf_pooling_type: "last_token"  # "last_token" (for decoder models), "mean", "cls"
  hf_use_flash_attention: true   # Use flash attention for faster training
  hf_torch_dtype: "bfloat16"     # "float16", "bfloat16", or "float32"
  hf_use_projection: true        # Project backbone output to embed_dim
  hf_max_length: 768            # Maximum sequence length for tokenization
  hf_padding_side: "left"        # "left" for decoder models (Qwen), "right" for encoders  
  # Compile options for text model (overrides train.compile if set)
  compile_text: true
  text_compile_dynamic: true
  # Use fixed padding for static shapes (useful with cudagraphs)
  padding_to_max_length: false
  # Vision projection
  use_projection_head: true  # Project vision [CLS+mean(patch)] to VLM embed_dim
  
  # Logit scale (temperature)
  init_logit_scale: 2.659260036932778  # ln(1/0.07) from CLIP
  freeze_logit_scale: false

  # OSL Configuration
  osl_enabled: false           # Enable Opposite Sentence Loss
  osl_loss_weight: 0.5        # Weight for OSL loss (L = clip + osl_weight * osl)
  osl_K: 8                    # Number of sentence pairs per sample
  osl_max_length: 256         # Max token length for OSL sentences
  osl_seed: null              # Optional seed for reproducible OSL sampling

# ============ Training Configuration ============
train:
  batch_size_per_gpu: 35
  dataset_path: null  # Will be set in training script
  saveckp_freq: 20
  seed: 0
  num_workers: 12
  OFFICIAL_EPOCH_LENGTH: 1000
  monitor_gradient_norm: false
  chunk_schedule: []
  cache_dataset: true
  use_teacher_head: true
  learn_from_teacher_tokens: false
  centering: sinkhorn_knopp
  checkpointing: true
  checkpointing_full: false
  compile: true
  cudagraphs: false
  cell_augmentation: false
  cell_augmentation_type: hpa
  sharded_eval_checkpoint: true

# ============ Student Configuration ============
student:
  arch: fleximeddinov3_base
  img_size: 128
  patch_size: 8
  drop_path_rate: 0.2
  layerscale: 1.0e-05
  patch_drop: 0.0
  pretrained_weights: ''
  dinov3_weights: ''  # Path to pretrained DINOv3 weights for initialization
  ffn_layer: mlp
  ffn_ratio: 4.0
  resume_from_teacher_chkpt: "3D_model.pth"
  qkv_bias: false
  proj_bias: true
  ffn_bias: true
  norm_layer: layernorm
  n_storage_tokens: 4
  mask_k_bias: true
  in_chans: 1
  pos_embed_type: rope
  pos_embed_rope_base: 100.0
  pos_embed_rope_min_period: null
  pos_embed_rope_max_period: null
  pos_embed_rope_normalize_coords: separate
  pos_embed_rope_shift_coords: null
  pos_embed_rope_jitter_coords: null
  pos_embed_rope_rescale_coords: 2
  pos_embed_rope_dtype: bf16
  fp8_enabled: false
  fp8_filter: "blocks"

# ============ Teacher Configuration ============
teacher:
  momentum_teacher: null
  final_momentum_teacher: null
  warmup_teacher_temp: null
  teacher_temp: null
  warmup_teacher_temp_epochs: null
  in_chans: 1

# ============ Distillation Configuration ============
distillation:
  enabled: false
  full_cfg_path: ''
  checkpoint_path: ''

multidistillation:
  enabled: false

hrft:
  enabled: false
  checkpoint_path: ''

# ============ Optimizer Configuration ============
optim:
  epochs: 50
  optimizer: adamw
  weight_decay: null
  weight_decay_end: null
  lr: null
  schedule_trunc_extra: null
  warmup_epochs: null
  min_lr: null
  clip_grad: 3.0
  freeze_last_layer_epochs: null
  scaling_rule: sqrt_wrt_1024
  patch_embed_lr_mult: 0.2
  dino_head_wd_multiplier: 1.0
  layerwise_decay: 0.9
  multi_tensor_optim: true
  dump_fsdp_weights_path: ''
  adamw_beta1: 0.9
  adamw_beta2: 0.999

# ============ Crops Configuration (3D) ============
crops:
  local_views_scale: 
    - 0.25
    - 0.5
  local_crops_number: 8
  global_crops_size:
    - 160
    - 160
    - 160
  local_crops_size:
    - 80
    - 80
    - 80
  gram_teacher_crops_size:
  - 160
  - 160
  - 160
  localcrops_subset_of_globalcrops: false
  share_color_jitter: false
  horizontal_flips: true

# ============ Checkpointing Configuration ============
checkpointing:
  period: 1000
  max_to_keep: 99999

# ============ Learning Rate Schedules ============
schedules:
  lr:
    start: 0
    peak: 1.0e-04
    end: 1.0e-06
    warmup_epochs: 2
    freeze_last_layer_epochs: 0
  weight_decay:
    start: 0.04
    peak: 0.04
    end: 0.04
    warmup_epochs: 0
  teacher_temp:
    start: 0.07
    peak: 0.07
    end: 0.07
    warmup_epochs: 0
  momentum:
    start: 0.999
    peak: 0.999
    end: 0.999
    warmup_epochs: 0
