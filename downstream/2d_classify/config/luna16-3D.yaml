dataset_name: "raidium/CuriaBench"
dataset_config: "luna16-3D"
# pretrained: '/path/to/project-data/dinov3_weights/fleximeddinov3_b_ct_pretrain_all_data_augmentation/converted_ckpt/199999/model.pth'
pretrained: '/path/to/project-data/dinov3_weights/CT_2D/final_model.pth'
use_feature_caching: true
patch_size: 16
img_size: 512
epochs: 200 # 200
batch_size: 64
learning_rate: 0.02
num_workers: 8
eval_steps: 30
greedy: True

output_dir: "/path/to/project-data/results/luna16-3D/ours"
model:
  model_name: "raidium/curia"
  num_classes: 2
  attention_cfg:
    num_heads: 1
    num_queries: 1
    attention_block: ["self", "cross"]
  num_slices: 3
  use_avgpool_per_slice: false
  use_avgpool_on_the_volume: false
  use_class_token: false